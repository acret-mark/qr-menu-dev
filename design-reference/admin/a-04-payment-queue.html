<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A-04 · Payment Queue — Hapag reference</title>

</head>
<body>
<!--

  per 03_screen-list.md. Matches subscriptions.status = 'pending' in
  04_data-model.md. Each row's "Review" action goes to A-05 Activate
  Subscription.
-->
<div class="admin-shell">
  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-sidebar-header">
      <div class="biz-logo" style="width:30px; height:30px; font-size:0.85rem; flex-shrink:0;">H</div>
      <span class="wordmark">Hapag Admin</span>
    </div>
    <nav class="admin-nav">
      <ul>
        <li><a class="admin-nav-item" href="a-02-business-list.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21V12h6v9"/></svg>
          <span>Businesses</span>
        </a></li>
        <li><a class="admin-nav-item active" href="a-04-payment-queue.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          <span>Payments</span>
        </a></li>
        <li><a class="admin-nav-item" href="a-06-support-tickets.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
          <span>Support</span>
        </a></li>
      </ul>
    </nav>
    <div class="admin-sidebar-footer">
      <button type="button" id="collapse-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg>
        <span>Collapse</span>
      </button>
    </div>
  </aside>

  <div class="admin-main-col">
    <header class="admin-topbar">
      <div class="admin-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0; opacity:0.7;"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Search payments…</span>
      </div>
      <div class="admin-topbar-spacer"></div>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <div class="admin-avatar">AC</div>
    </header>

    <main class="admin-main">
      <h1 class="admin-page-title">Payment Queue</h1>
      <p class="admin-page-sub">Payment proofs waiting for verification.</p>

      <div class="admin-table-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Business</th>
              <th>Plan</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Proof</th>
              <th>Submitted</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Barrio Fiesta Cafe</td>
              <td>Standard</td>
              <td>₱299</td>
              <td>GCash</td>
              <td>
                <div class="item-thumb" style="width:32px; height:32px; border-radius:6px;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
                </div>
              </td>
              <td>Jul 9, 2026</td>
              <td><a class="btn btn-primary" href="a-05-activate-subscription.html" style="padding:6px 14px; font-size:0.8rem;">Review</a></td>
            </tr>
            <tr>
              <td>Ihawan Grill House</td>
              <td>Standard</td>
              <td>₱299</td>
              <td>Bank Transfer</td>
              <td>
                <div class="item-thumb" style="width:32px; height:32px; border-radius:6px;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
                </div>
              </td>
              <td>Jul 8, 2026</td>
              <td><a class="btn btn-primary" href="a-05-activate-subscription.html" style="padding:6px 14px; font-size:0.8rem;">Review</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script>
  document.getElementById("collapse-btn").addEventListener("click", function () {
    document.getElementById("sidebar").classList.toggle("collapsed");
  });
  document.getElementById("theme-toggle").addEventListener("click", function () {
    document.documentElement.classList.toggle("dark");
  });
</script>
</body>
</html>
