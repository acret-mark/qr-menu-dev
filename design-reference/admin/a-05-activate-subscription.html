<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A-05 · Activate Subscription — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  A-05 Activate Subscription — "Confirm payment -> set plan + billing
  date" per 03_screen-list.md. Reached from A-04's "Review" action, for
  "Barrio Fiesta Cafe"'s pending payment.
-->
<div class="admin-shell">
  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-sidebar-header">
      <div class="biz-logo" style="width:30px; height:30px; font-size:0.85rem; flex-shrink:0;">H</div>
      <span class="wordmark">Hapag Admin</span>
    </div>
    <nav class="admin-nav">
      <ul>
        <li><a class="admin-nav-item" href="a-02-business-list.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21V12h6v9"/></svg>
          <span>Businesses</span>
        </a></li>
        <li><a class="admin-nav-item active" href="a-04-payment-queue.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          <span>Payments</span>
        </a></li>
        <li><a class="admin-nav-item" href="a-06-support-tickets.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
          <span>Support</span>
        </a></li>
      </ul>
    </nav>
    <div class="admin-sidebar-footer">
      <button type="button" id="collapse-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg>
        <span>Collapse</span>
      </button>
    </div>
  </aside>

  <div class="admin-main-col">
    <header class="admin-topbar">
      <a class="icon-btn" href="a-04-payment-queue.html" aria-label="Back to payment queue">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <div class="admin-topbar-spacer"></div>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <div class="admin-avatar">AC</div>
    </header>

    <main class="admin-main" style="max-width:760px;">
      <h1 class="admin-page-title">Activate Subscription</h1>
      <p class="admin-page-sub">Barrio Fiesta Cafe · submitted Jul 9, 2026</p>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="admin-table-card" style="padding:20px;">
          <div style="font-size:0.78rem; color:var(--muted-foreground); margin-bottom:10px;">Payment proof</div>
          <div class="item-thumb" style="width:100%; height:220px; border-radius:10px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
          </div>
          <div style="font-size:0.8rem; margin-top:12px; display:flex; justify-content:space-between; color:var(--muted-foreground);">
            <span>Method</span><span style="color:var(--foreground); font-weight:500;">GCash</span>
          </div>
          <div style="font-size:0.8rem; margin-top:6px; display:flex; justify-content:space-between; color:var(--muted-foreground);">
            <span>Amount</span><span style="color:var(--foreground); font-weight:500;">₱299</span>
          </div>
        </div>

        <div>
          <div class="field-group" style="margin-bottom:14px;">
            <label class="field-label" for="plan-select">Plan</label>
            <div style="position:relative;">
              <select class="field-select" id="plan-select" style="appearance:none; width:100%;">
                <option>Standard — ₱299/month</option>
                <option>Pro — ₱399/month</option>
              </select>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted-foreground); pointer-events:none;"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <div class="field-group" style="margin-bottom:14px;">
            <label class="field-label" for="starts-at">Billing starts</label>
            <input class="field-input" id="starts-at" type="date" value="2026-07-10" />
          </div>
          <div class="field-group" style="margin-bottom:20px;">
            <label class="field-label" for="expires-at">Billing ends</label>
            <input class="field-input" id="expires-at" type="date" value="2026-08-10" />
          </div>

          <a class="btn btn-primary btn-block" href="a-04-payment-queue.html">Activate Subscription</a>
          <a class="btn btn-outline btn-block" href="a-04-payment-queue.html" style="margin-top:10px;">Reject Payment</a>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  document.getElementById("collapse-btn").addEventListener("click", function () {
    document.getElementById("sidebar").classList.toggle("collapsed");
  });
  document.getElementById("theme-toggle").addEventListener("click", function () {
    document.documentElement.classList.toggle("dark");
  });
</script>
</body>
</html>
