<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>S-02 · Reset Password — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  S-02 Reset Password — "New password entry" per 03_screen-list.md.
  Reached by clicking the link sent from S-01 (not simulated here — you
  land here directly, same convention as O-03/O-05 standing in for an
  emailed link click elsewhere in this reference).
-->
<div class="phone-page">
  <div class="scroll-area">
    <div class="auth-page">
      <div class="auth-logo">H</div>
      <h1 class="auth-wordmark">Set a new password</h1>
      <div class="auth-subtitle" style="text-align:center; max-width: 30ch;">Choose a new password for your account.</div>

      <form class="auth-form">
        <div class="field-group">
          <label class="field-label" for="password">New password</label>
          <div class="password-field-wrap">
            <input class="field-input" id="password" type="password" placeholder="At least 8 characters" />
            <button type="button" class="eye-btn" aria-label="Show password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" for="confirm-password">Confirm new password</label>
          <div class="password-field-wrap">
            <input class="field-input" id="confirm-password" type="password" placeholder="Re-enter your new password" />
            <button type="button" class="eye-btn" aria-label="Show password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <a class="btn btn-primary btn-block" href="../owner/o-02-login.html" style="margin-top: 8px;">Reset Password</a>
      </form>
    </div>
  </div>
</div>
</body>
</html>
