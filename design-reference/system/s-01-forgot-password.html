<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>S-01 · Forgot Password — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  S-01 Forgot Password — "Email reset flow" per 03_screen-list.md. No
  pixel spec exists for Phase E (05c only covers Phase B) — reuses the
  auth-page layout from O-01/O-02.

  Judgment call: skips a separate "check your email" interstitial (like
  O-03's for registration) — "Send Reset Link" goes straight to S-02.
  03_screen-list.md only lists 4 System/Edge screens total with no
  extra confirmation step for this flow, and O-03 already demonstrates
  that interstitial pattern once elsewhere; repeating it here felt
  redundant for a design reference.
-->
<div class="phone-page">
  <div class="scroll-area">
    <div class="auth-page">
      <div class="auth-logo">H</div>
      <h1 class="auth-wordmark">Reset your password</h1>
      <div class="auth-subtitle" style="text-align:center; max-width: 30ch;">Enter the email on your account and we'll send you a link to reset your password.</div>

      <form class="auth-form">
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <input class="field-input" id="email" type="email" placeholder="you@business.com" />
        </div>
        <a class="btn btn-primary btn-block" href="s-02-reset-password.html" style="margin-top: 8px;">Send Reset Link</a>
      </form>

      <div class="auth-footer">Remembered your password? <a href="../owner/o-02-login.html">Log in</a></div>
    </div>
  </div>
</div>
</body>
</html>
