<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O-04 · Dashboard Home — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  O-04 Dashboard Home — first screen after login.
  Source: planning/wireframes/guide/05c_wireframe-owner-core-flow.md
  Sample data continues "The Manila Table" from the Customer Menu
  reference pages — 8 categories, matching design-reference/customer/.

  The Menu Items / Categories summary cards are tappable shortcuts to
  O-07 / O-06 respectively, and "Recent Items" has a "See all" link to
  O-07 — the spec's Quick Actions row only covers Add Item / Download QR,
  which left no path from this screen to the item list or category
  manager at all.

  Avatar now links to O-05 Business Profile, and the Plan/Status card
  links to O-10 Subscription — same reasoning: Phase C's screens
  (O-03/O-05/O-10/O-11) had no entry point from anywhere in Phase B.
-->
<div class="phone-page">
  <nav class="nav-bar">
    <div class="nav-side"></div>
    <h1 class="nav-title">Dashboard</h1>
    <div class="nav-side" style="justify-content:flex-end;">
      <a class="avatar-circle" href="o-05-business-profile.html" aria-label="Business profile" style="text-decoration:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </a>
    </div>
  </nav>

  <div class="scroll-area">
    <div class="dash-greeting">Good morning, The Manila Table</div>

    <div class="summary-row">
      <a class="summary-card" href="o-07-menu-item-list.html" style="text-decoration:none; color:inherit;">
        <div class="summary-number">18</div>
        <div class="summary-label">Menu Items</div>
      </a>
      <a class="summary-card" href="o-06-category-manager.html" style="text-decoration:none; color:inherit;">
        <div class="summary-number">8</div>
        <div class="summary-label">Categories</div>
      </a>
    </div>

    <a class="sub-card" href="o-05-business-profile.html#subscription" style="text-decoration:none;">
      <span>Plan:</span> <span class="value">Standard</span>
      <span class="sep">·</span>
      <span>Status:</span> <span class="status-badge success">Active</span>
    </a>

    <div class="section-label">Quick Actions</div>
    <div class="quick-actions">
      <a class="btn btn-primary" href="o-08-add-edit-item.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Add Item
      </a>
      <a class="btn btn-outline" href="o-09-qr-code.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM19 14h2M14 19h2M19 19h2"/></svg>
        Download QR
      </a>
    </div>

    <div class="section-label" style="display:flex; align-items:baseline; justify-content:space-between;">
      <span>Recent Items</span>
      <a href="o-07-menu-item-list.html" style="font-size:0.75rem; font-weight:500; color:var(--muted-foreground); text-decoration:none;">See all</a>
    </div>
    <ul>
      <li><a class="recent-row" href="o-08-add-edit-item.html">
        <div class="name">Chicken Adobo</div>
        <div class="cat">Mains</div>
      </a></li>
      <li><a class="recent-row" href="o-08-add-edit-item.html">
        <div class="name">Halo-Halo</div>
        <div class="cat">Desserts</div>
      </a></li>
      <li><a class="recent-row" href="o-08-add-edit-item.html">
        <div class="name">Sisig</div>
        <div class="cat">Mains</div>
      </a></li>
    </ul>
  </div>

  <nav class="tab-bar">
    <ul>
      <li><a class="tab-bar-item active" href="o-04-dashboard-home.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
        <span>Dashboard</span>
      </a></li>
      <li><a class="tab-bar-item" href="o-07-menu-item-list.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="4" r="1"/><path d="M12 5v3"/><path d="M2 8h20"/><path d="M4 8v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/></svg>
        <span>Menu</span>
      </a></li>
      <li><a class="tab-bar-item" href="o-06-category-manager.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0L2 12V2h10l8.6 8.6a2 2 0 0 1 0 2.8Z"/><path d="M7 7h.01"/></svg>
        <span>Categories</span>
      </a></li>
      <li><a class="tab-bar-item" href="o-09-qr-code.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM19 14h2M14 19h2M19 19h2"/></svg>
        <span>QR Code</span>
      </a></li>
    </ul>
  </nav>
</div>
</body>
</html>
