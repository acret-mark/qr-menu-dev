<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O-08 · Edit Item — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  O-08 Add / Edit Item — shown here in Edit mode (existing item: Chicken
  Adobo) since that's the mode with the most to show (pre-filled fields,
  the photo already uploaded, Delete Item link only visible in Edit mode
  per the spec's note). Add mode is the same layout with empty fields and
  no Delete link.
  Source: planning/wireframes/guide/05c_wireframe-owner-core-flow.md

  Three toggles, three different fields — don't conflate them:
  - Best Seller → is_best_seller.
  - Available → is_sold_out (inverted: on = available to order, off =
    sold out / "Ubos Na"). Same toggle as the quick one on O-07.
  - Show on Menu → is_displayed, whether the item appears on the
    customer-facing menu at all. Only editable here, not from O-07's list
    — it's a rarer, more deliberate action than the sold-out toggle.

  AI Description (O-08a, Pro only, see planning/added-feature/01_ai-description-engine.md):
  name field alone triggers generation on blur — keywords are optional,
  collapsed by default. States shown here: draft review (accept/decline,
  "AI-drafted" tag) is the default demo state; click Regenerate/Decline to
  see the loading and manual-entry states. description_source is set to
  ai_generated on accept, manual on decline or any edit after acceptance.
-->
<div class="phone-page">
  <nav class="nav-bar">
    <a class="back-btn" href="o-07-menu-item-list.html" aria-label="Back to menu items">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <h1 class="nav-title">Edit Item</h1>
    <a class="nav-action" href="o-07-menu-item-list.html">Save</a>
  </nav>

  <div class="scroll-area">
    <div class="upload-area">
      <div class="item-thumb" style="position:absolute; inset:0; border-radius: var(--radius);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="width:26%; height:26%;"><path d="M4 13a8 8 0 0 0 16 0Z"/><path d="M4 13h16"/><path d="M12 3v4"/></svg>
      </div>
      <div style="position:relative; background:rgba(0,0,0,0.45); color:#fff; padding:6px 12px; border-radius:999px; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
        Tap to change photo
      </div>
    </div>

    <form style="display:flex; flex-direction:column; gap:12px; padding: 12px 16px 0;">
      <div class="field-group">
        <label class="field-label" for="item-name">Item name</label>
        <input class="field-input" id="item-name" type="text" value="Chicken Adobo" />
      </div>

      <div class="field-group">
        <label class="field-label" for="item-category">Category</label>
        <div style="position:relative;">
          <select class="field-select" id="item-category" style="appearance:none; width:100%;">
            <option>Starters</option>
            <option>Soups</option>
            <option selected>Mains</option>
            <option>Noodles</option>
            <option>Sides</option>
            <option>Drinks</option>
            <option>Desserts</option>
            <option>Coffee &amp; Tea</option>
          </select>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted-foreground); pointer-events:none;"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="item-price">Price</label>
        <div class="field-price-wrap">
          <span class="prefix">₱</span>
          <input class="field-input" id="item-price" type="text" value="320" />
        </div>
      </div>

      <div class="field-group" id="ai-desc-block">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <label class="field-label" for="item-desc">Description</label>
          <span class="pill ai" id="ai-desc-tag">AI-drafted</span>
        </div>

        <!-- Keywords: collapsed by default, optional refinement before/after a draft exists -->
        <button type="button" class="ai-keywords-toggle" id="keywords-toggle">+ Add keywords for a more specific description</button>
        <div class="ai-keywords-panel" id="keywords-panel" hidden>
          <input class="field-input" type="text" id="item-keywords" placeholder="e.g. spicy, family recipe, grilled" />
          <button type="button" class="btn btn-outline" id="regenerate-btn">Regenerate</button>
        </div>

        <!-- Pending state: shown briefly on first name-blur and on Regenerate -->
        <div class="ai-desc-loading" id="ai-loading" hidden>
          <span class="spinner" aria-hidden="true"></span>
          Generating description…
        </div>

        <!-- Draft review state: AI candidate, owner accepts or declines -->
        <div id="ai-draft">
          <textarea class="field-textarea" id="item-desc" readonly>Chicken braised in soy sauce, cane vinegar, garlic, and bay leaf.</textarea>
          <div class="ai-draft-actions" style="margin-top:8px;">
            <button type="button" class="btn btn-outline" id="decline-btn">Decline — write my own</button>
            <button type="button" class="btn btn-primary" id="accept-btn">Accept</button>
          </div>
        </div>

        <!-- Manual entry state: shown on decline, on generation failure, or after accepting (editable, no accept/decline chrome) -->
        <textarea class="field-textarea" id="item-desc-manual" placeholder="Write a description…" hidden></textarea>
      </div>
    </form>

    <div style="margin-top: 24px;">
      <div class="toggle-form-row">
        <span>Best Seller</span>
        <button class="toggle-switch on" aria-label="Toggle best seller"></button>
      </div>
      <div class="toggle-form-row">
        <span>Available</span>
        <button class="toggle-switch on" aria-label="Toggle available"></button>
      </div>
      <div class="toggle-form-row">
        <span>Show on Menu</span>
        <button class="toggle-switch on" aria-label="Toggle show on menu"></button>
      </div>
    </div>

    <div style="padding: 32px 16px 32px;">
      <a class="btn btn-primary btn-block" href="o-07-menu-item-list.html">Save Item</a>
      <a class="delete-link" href="#">Delete Item</a>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll(".toggle-switch").forEach(function (sw) {
    sw.addEventListener("click", function () {
      sw.classList.toggle("on");
    });
  });

  // Demo only — click-through for the AI description states (loading →
  // draft review → accept/decline). The real component drives these same
  // states from the generation API call's lifecycle, not a click handler.
  (function () {
    var keywordsToggle = document.getElementById("keywords-toggle");
    var keywordsPanel = document.getElementById("keywords-panel");
    var loading = document.getElementById("ai-loading");
    var draft = document.getElementById("ai-draft");
    var descTag = document.getElementById("ai-desc-tag");
    var manual = document.getElementById("item-desc-manual");
    var acceptBtn = document.getElementById("accept-btn");
    var declineBtn = document.getElementById("decline-btn");
    var regenerateBtn = document.getElementById("regenerate-btn");

    keywordsToggle.addEventListener("click", function () {
      keywordsPanel.hidden = !keywordsPanel.hidden;
    });

    function showLoading() {
      draft.hidden = true;
      descTag.hidden = true;
      loading.hidden = false;
    }

    function showDraft() {
      loading.hidden = true;
      draft.hidden = false;
      descTag.hidden = false;
    }

    regenerateBtn.addEventListener("click", function () {
      showLoading();
      setTimeout(showDraft, 900);
    });

    acceptBtn.addEventListener("click", function () {
      // Accepted draft becomes directly editable manual text — no re-decline step needed.
      draft.hidden = true;
      descTag.hidden = false;
      manual.hidden = false;
      manual.value = document.getElementById("item-desc").value;
    });

    declineBtn.addEventListener("click", function () {
      draft.hidden = true;
      descTag.hidden = true;
      manual.hidden = false;
      manual.value = "";
      manual.focus();
    });
  })();
</script>
</body>
</html>
