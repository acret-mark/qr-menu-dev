<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O-11 · Ticket Detail (Open) — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  O-11 Support — ticket detail (Open, no reply yet). Reached by tapping
  a ticket row on o-05-business-profile.html's Support tab, per your
  feedback that tapping a ticket should navigate to its detail, not
  expand it inline (the earlier accordion approach is removed).

  Title is a real <h1> for semantics/accessibility, but overrides the
  global heading font (Playfair Display serif) back to Inter — the same
  subject string already renders as bold sans (.subject, in the list
  row on o-05's Support tab), so switching it to serif on this screen
  would be an inconsistent treatment of the same piece of data, unlike
  e.g. C-03's dish name or A-02/A-03's business name, which are proper
  names/brand content suited to the serif treatment.
-->
<div class="phone-page">
  <nav class="nav-bar">
    <a class="back-btn" href="o-05-business-profile.html#support" aria-label="Back to support">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="nav-title">Ticket</div>
    <div class="nav-side"></div>
  </nav>

  <div class="scroll-area">
    <div style="padding: 20px 16px 0;">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
        <h1 style="font-size:1.2rem; flex:1; font-family:'Inter',sans-serif;">QR code won't download</h1>
        <span class="status-badge warning" style="flex-shrink:0; margin-top:2px;">Open</span>
      </div>
      <div style="font-size:0.8rem; color:var(--muted-foreground); margin-top:4px;">Submitted Jul 8, 2026</div>
    </div>

    <div class="ticket-card-body" style="margin-top:20px; border-top:none;">
      <div class="label">Your message</div>
      <div class="msg">The "Download PNG" button on the QR Code page doesn't do anything when I tap it on my phone. Tried twice already.</div>
      <div class="reply-block">
        <div class="label">ACRET Support</div>
        <div class="awaiting">Awaiting response</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
