<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O-02 · Login — Hapag reference</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="../reference.css" />
</head>
<body>
<!--
  O-02 Login — returning owner sign-in.
  Source: planning/wireframes/guide/05c_wireframe-owner-core-flow.md
  "Forgot password?" now links to S-01 Forgot Password (built in
  design-reference/system/).
-->
<div class="phone-page">
  <div class="scroll-area">
    <div class="auth-page">
      <div class="auth-logo">H</div>
      <h1 class="auth-wordmark">Hapag</h1>
      <div class="auth-subtitle">Welcome back</div>

      <form class="auth-form">
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <input class="field-input" id="email" type="email" placeholder="you@business.com" />
        </div>
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="password-field-wrap">
            <input class="field-input" id="password" type="password" placeholder="Your password" />
            <button type="button" class="eye-btn" aria-label="Show password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <!-- Points to S-01 Forgot Password once Phase E is built -->
        <a class="forgot-link" href="../system/s-01-forgot-password.html">Forgot password?</a>
        <a class="btn btn-primary btn-block" href="o-04-dashboard-home.html" style="margin-top: 8px;">Log In</a>
      </form>

      <div class="auth-footer">New to Hapag? <a href="o-01-register.html">Register</a></div>
    </div>
  </div>
</div>
</body>
</html>
