<!--

  didn't seem worth a 5th/6th file split. Split it out if you'd rather
  review them independently.
-->
<div class="phone-page">

  <header class="menu-topbar">
    <a class="back-btn" href="c-01-menu-home.html" aria-label="Back to menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>

    <div style="flex:1; display:flex; align-items:center; gap:8px; padding: 10px 14px; background: var(--muted); border: 1px solid var(--border); border-radius: 999px; font-size: 0.9rem;">

  <ul class="item-list" style="padding-top: 4px;">
    <li><a class="item-card" href="c-03-item-detail.html">

        <div class="item-price">₱320</div>
      </div>
    </a></li>
  </ul>

  <hr style="border:none; border-top:1px dashed var(--border); margin: 8px 16px;" />

  <div style="padding: 12px 16px 4px; font-size: 0.72rem; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.04em;">Alternate state — no matches</div>

  <div class="empty-state" style="padding: 24px;">

      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/><path d="M8 8l6 6M14 8l-6 6"/></svg>
